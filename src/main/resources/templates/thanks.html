<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Thanks • JB Performance Landscaping</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<header th:replace="fragments :: siteHeader"></header>

<main class="container page">
  <div class="row justify-content-center">
    <div class="col-lg-9">

      <div class="p-4 p-md-5 card-clean">
        <div class="d-flex align-items-start gap-3">
          <div class="text-success fs-2"><i class="bi bi-check-circle-fill"></i></div>
          <div>
            <h1 class="fw-bold mb-1">Thanks!</h1>
            <p class="text-muted2 mb-4">Your request was sent. We will reach out soon.</p>
          </div>
        </div>

        <div class="border-top pt-4">
          <h5 class="fw-bold mb-3">Request Summary</h5>

          <div class="row g-3">
            <div class="col-md-6">
              <div class="text-muted2 small">Name</div>
              <div class="fw-semibold" th:text="${quote.name}"></div>
            </div>
            <div class="col-md-6">
              <div class="text-muted2 small">Email</div>
              <div class="fw-semibold" th:text="${quote.email}"></div>
            </div>
            <div class="col-md-6">
              <div class="text-muted2 small">Phone</div>
              <div class="fw-semibold" th:text="${quote.phone}"></div>
            </div>
            <div class="col-md-6">
              <div class="text-muted2 small">Service</div>
              <div class="fw-semibold" th:text="${quote.service}"></div>
            </div>
            <div class="col-12">
              <div class="text-muted2 small">Details</div>
              <div class="fw-semibold" th:text="${quote.message}"></div>
            </div>
          </div>

          <div class="d-flex flex-wrap gap-2 mt-4">
            <a class="btn btn-brand" th:href="@{/}"><i class="bi bi-house me-2"></i>Back to Home</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
