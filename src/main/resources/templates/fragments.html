<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="siteHeader">
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top site-nav">
    <div class="container-fluid site-container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/}">
        <img src="/images/logo.png" alt="JB Performance Landscaping Logo" class="brand-logo">
        <span>JB Performance Landscaping</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/services}">Services</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/gallery}">Gallery</a></li>
        </ul>

        <a class="btn btn-brand ms-lg-3 mt-3 mt-lg-0" th:href="@{/contact}">
          Free Quote
        </a>
      </div>
    </div>
  </nav>
</header>
</body>
</html>
